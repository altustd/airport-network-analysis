[workspace]
name = "airport-network-analysis"
channels = ["conda-forge"]
platforms = ["osx-arm64", "win-64"]

[dependencies]
python = "3.12.*"
pandas = ">=2.2"
numpy = ">=1.26"
networkx = ">=3.3"
plotly = ">=5.22"
scipy = ">=1.13"
requests = ">=2.32"
nbformat = ">=5.10"
jupyter = ">=1.0"
ipykernel = ">=6.29"
jupyter-cache = ">=1.0.1,<2"
matplotlib = ">=3.8"
python-kaleido = ">=0.2"

[tasks]
render     = "quarto render airport-network-analysis.qmd"
render-pdf = "quarto render airport-network-analysis.qmd --to pdf"
preview    = "quarto preview airport-network-analysis.qmd"
